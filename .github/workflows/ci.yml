name: CI

on:
  pull_request:
  push:
    branches:
      - dev/saphyr-parser

jobs:
  check:
    name: Lints and checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal --component rustfmt --no-self-update
      - run: rustup target add wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Check `no_std` compatibility
        run: cargo check -p saphyr --no-default-features --target wasm32v1-none

  test:
    name: Test using Rust ${{ matrix.rust }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Run build
        run: cargo build
      - name: Run tests
        run: cargo test -v
